<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike's Project Dashboard v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            margin-bottom: 40px;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid #333;
        }
        
        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #888;
            font-size: 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab:hover {
            color: #e0e0e0;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }
        
        .project-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .project-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
        }
        
        .project-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .project-desc {
            color: #aaa;
            font-size: 0.95rem;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.85rem;
        }
        
        .meta-item {
            padding: 4px 10px;
            background: #252525;
            border-radius: 4px;
            color: #bbb;
        }
        
        .meta-item strong {
            color: #667eea;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-live { background: #10b981; color: #000; }
        .status-building { background: #f59e0b; color: #000; }
        .status-idea { background: #6366f1; color: #fff; }
        
        .category-section {
            margin-bottom: 48px;
        }
        
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            cursor: pointer;
            user-select: none;
        }
        
        .category-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #fff;
        }
        
        .category-count {
            color: #888;
            font-size: 0.9rem;
        }
        
        .collapse-icon {
            color: #667eea;
            font-size: 1.5rem;
            transition: transform 0.2s;
        }
        
        .category-header.collapsed .collapse-icon {
            transform: rotate(-90deg);
        }
        
        .category-content {
            max-height: 10000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .category-content.collapsed {
            max-height: 0;
        }
        
        .backlog {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-top: 32px;
        }
        
        .backlog h3 {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 16px;
        }
        
        .backlog ul {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        
        .backlog li {
            padding: 12px;
            background: #252525;
            border-radius: 6px;
            color: #bbb;
            font-size: 0.9rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Mike's Project Dashboard</h1>
            <div class="last-updated" id="lastUpdate">Loading...</div>
        </header>
        
        <div class="tabs">
            <button class="tab active" data-tab="active">Active Projects</button>
            <button class="tab" data-tab="ideas">Ideas Repository</button>
        </div>
        
        <div id="active" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalProjects">0</div>
                    <div class="stat-label">Total Projects</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="liveProjects">0</div>
                    <div class="stat-label">Live</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="buildingProjects">0</div>
                    <div class="stat-label">Building</div>
                </div>
            </div>
            
            <div class="projects-grid" id="activeProjects">
                <!-- Active projects rendered here -->
            </div>
        </div>
        
        <div id="ideas" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalIdeas">0</div>
                    <div class="stat-label">Total Ideas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="quickWins">0</div>
                    <div class="stat-label">Quick Wins (&lt;8h)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="highRevenue">0</div>
                    <div class="stat-label">High Revenue Potential</div>
                </div>
            </div>
            
            <div id="ideasContainer">
                <!-- Ideas categories rendered here -->
            </div>
            
            <div class="backlog">
                <h3>Quick Backlog Ideas</h3>
                <ul id="backlogList">
                    <!-- Backlog items rendered here -->
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        // Active projects - dynamically loaded from ideas.json
        let activeProjects = [
            {
                title: "Freedom Audit",
                status: "live",
                url: "https://freedom-audit-ten.vercel.app/",
                description: "Comprehensive life assessment tool with AI-generated reports",
                progress: 100
            },
            {
                title: "X Content Dashboard",
                status: "live",
                description: "Content queue management for X/Twitter",
                progress: 100
            },
            {
                title: "Project Dashboard v2",
                status: "building",
                description: "Enhanced dashboard with ideas repository",
                progress: 75
            },
            {
                title: "Rose - Chief of Staff Agent",
                status: "building",
                description: "Coordinates home and work life for Mike & Claire. Manages Gmail, calendars, communicates via Telegram. Anthropomorphic persona.",
                progress: 70,
                url: "/home/openclaw/.openclaw/workspace/rose/"
            }
        ];
        
        // Load ideas from JSON
        let ideasData = null;
        
        fetch('ideas.json')
            .then(r => r.json())
            .then(data => {
                ideasData = data;
                
                // Auto-load active projects from ideas.json if they have status: building/live/in-progress
                // This keeps the dashboard automatically synced with ideas.json
                const autoActiveProjects = [];
                data.categories.forEach(category => {
                    category.ideas.forEach(idea => {
                        if (idea.status && ['building', 'live', 'in-progress'].includes(idea.status)) {
                            autoActiveProjects.push({
                                title: idea.title,
                                status: idea.status === 'in-progress' ? 'building' : idea.status,
                                description: idea.description,
                                progress: idea.progress || 50,
                                url: idea.url || idea.location || null
                            });
                        }
                    });
                });
                
                // Merge with hardcoded active projects (keeping Freedom Audit, X Content Dashboard, Project Dashboard)
                // Remove duplicates based on title
                const mergedProjects = [...activeProjects];
                autoActiveProjects.forEach(autoProject => {
                    if (!mergedProjects.find(p => p.title === autoProject.title)) {
                        mergedProjects.push(autoProject);
                    }
                });
                activeProjects = mergedProjects;
                
                renderActiveProjects();
                renderIdeas();
            })
            .catch(err => console.error('Failed to load ideas:', err));
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;
                
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(targetTab).classList.add('active');
            });
        });
        
        // Render active projects
        function renderActiveProjects() {
            const container = document.getElementById('activeProjects');
            
            container.innerHTML = activeProjects.map(project => `
                <div class="project-card">
                    <div class="project-title">${project.title}</div>
                    <div class="project-desc">${project.description}</div>
                    <div class="project-meta">
                        <span class="status-badge status-${project.status}">${project.status}</span>
                        ${project.url ? `<a href="${project.url}" target="_blank" style="color: #667eea; text-decoration: none;">View →</a>` : ''}
                    </div>
                </div>
            `).join('');
            
            // Update stats
            document.getElementById('totalProjects').textContent = activeProjects.length;
            document.getElementById('liveProjects').textContent = activeProjects.filter(p => p.status === 'live').length;
            document.getElementById('buildingProjects').textContent = activeProjects.filter(p => p.status === 'building').length;
        }
        
        // Render ideas
        function renderIdeas() {
            if (!ideasData) return;
            
            const container = document.getElementById('ideasContainer');
            
            let totalIdeas = 0;
            let quickWins = 0;
            let highRevenue = 0;
            
            container.innerHTML = ideasData.categories.map(category => {
                totalIdeas += category.ideas.length;
                
                const categoryHTML = `
                    <div class="category-section">
                        <div class="category-header" onclick="toggleCategory(this)">
                            <div>
                                <div class="category-title">${category.name}</div>
                                <div class="category-count">${category.ideas.length} ideas</div>
                            </div>
                            <div class="collapse-icon">▼</div>
                        </div>
                        <div class="category-content">
                            <div class="projects-grid">
                                ${category.ideas.map(idea => {
                                    // Count quick wins
                                    if (idea.effort.match(/[0-8]h/)) quickWins++;
                                    
                                    // Count high revenue
                                    if (idea.revenue_potential.toLowerCase().includes('high')) highRevenue++;
                                    
                                    return `
                                        <div class="project-card">
                                            <div class="project-title">${idea.title}</div>
                                            <div class="project-desc">${idea.description}</div>
                                            <div class="project-meta">
                                                <span class="meta-item"><strong>Effort:</strong> ${idea.effort}</span>
                                                <span class="meta-item"><strong>Revenue:</strong> ${idea.revenue_potential}</span>
                                            </div>
                                            <div class="project-meta" style="margin-top: 8px;">
                                                <span class="meta-item"><strong>Leverage:</strong> ${idea.leverage}</span>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
                
                return categoryHTML;
            }).join('');
            
            // Render backlog
            document.getElementById('backlogList').innerHTML = ideasData.backlog_ideas.map(idea => 
                `<li>• ${idea}</li>`
            ).join('');
            
            // Update stats
            document.getElementById('totalIdeas').textContent = totalIdeas;
            document.getElementById('quickWins').textContent = quickWins;
            document.getElementById('highRevenue').textContent = highRevenue;
        }
        
        // Toggle category collapse
        function toggleCategory(header) {
            header.classList.toggle('collapsed');
            header.nextElementSibling.classList.toggle('collapsed');
        }
        
        // Update timestamp
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 'Last updated: ' + now.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }
        
        // Initialize
        renderActiveProjects();
        updateTimestamp();
    </script>
</body>
</html>
